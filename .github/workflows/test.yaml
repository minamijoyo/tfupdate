name: test
permissions:
  contents: read

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: '.go-version'
    - name: test
      run: make test
  testacc_terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        terraform:
        - 1.15.1
        - 1.14.9
        - 0.14.11
    env:
      TERRAFORM_VERSION: ${{ matrix.terraform }}
      TFUPDATE_EXEC_PATH: terraform
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: docker build
      run: docker compose build
    - name: terraform --version
      run: docker compose run --rm tfupdate terraform --version
    - name: testacc
      run: docker compose run --rm tfupdate make testacc
  testacc_opentofu:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        opentofu:
        - 1.11.6
        - 1.10.9
        - 1.6.3
    env:
      OPENTOFU_VERSION: ${{ matrix.opentofu }}
      TFUPDATE_EXEC_PATH: tofu
      TFREGISTRY_BASE_URL: https://registry.opentofu.org/
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: docker build
      run: docker compose build
    - name: tofu --version
      run: docker compose run --rm tfupdate tofu --version
    - name: testacc
      run: docker compose run --rm tfupdate make testacc
